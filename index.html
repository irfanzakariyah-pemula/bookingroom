<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SIPERU — Sistem Informasi Peminjaman Ruangan Universitas Yudharta Pasuruan. Login untuk mengajukan atau mengelola peminjaman ruangan kampus.">
    <title>SIPERU — Sistem Peminjaman Ruangan | Universitas Yudharta Pasuruan</title>
</head>

<body class="login-body">
    <!-- Animated Background Blobs -->
    <div class="login-bg-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Centered Login Card -->
    <div class="login-wrapper">
        <div class="login-glass-card">
            <!-- Logo Icon -->
            <div class="login-logo-icon">🏛️</div>

            <h1 class="login-title">SIPERU</h1>
            <p class="login-subtitle">
                Sistem Informasi Peminjaman Ruangan<br>
                <span class="univ-name">Universitas Yudharta Pasuruan</span>
            </p>

            <form id="loginForm">
                <div id="loginError" class="alert custom-alert-danger d-none" role="alert">
                    Login Tidak Berhasil! Periksa NIM/NIP dan password Anda.
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">NIM / NIP / Username</label>
                    <input type="text" class="form-control" id="username" required placeholder="Masukkan NIM atau NIP Anda">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Masukkan password">
                </div>

                <button type="submit" class="btn btn-login w-100">Masuk ke Dashboard</button>

                <p class="login-footer-text">
                    Gunakan akun NIM/NIP yang telah didaftarkan oleh Admin.<br>
                    &copy; 2026 Universitas Yudharta Pasuruan
                </p>
            </form>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
    <script type="module">
        import { login, getCurrentUser } from '/auth.js';

        const user = getCurrentUser();
        if (user) {
            window.location.href = user.role === 'admin' ? 'admin.html' : 'user.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('[type="submit"]');
            const errDiv = document.getElementById('loginError');

            errDiv.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Memproses...';

            const result = await login(userVal, passVal);
            if (result.success) {
                window.location.href = result.role === 'admin' ? 'admin.html' : 'user.html';
            } else {
                errDiv.textContent = result.message || 'Login Tidak Berhasil! Periksa NIM/NIP dan password Anda.';
                errDiv.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Masuk ke Dashboard';
            }
        });
    </script>
</body>

</html>
